version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sso_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sso_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sso}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sso_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sso_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sso}:${POSTGRES_PASSWORD:-sso_secret}@db:5432/${POSTGRES_DB:-sso_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./keys:/app/keys

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sso_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

  mailhog:
    image: mailhog/mailhog
    container_name: sso_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
